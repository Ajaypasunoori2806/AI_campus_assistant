name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t ai-campus .

    - name: Run container
      run: |
        docker run -d -p 8000:8000 --name test-container ai-campus
        sleep 5

    - name: Check running containers
      run: docker ps -a

    - name: Show logs
      run: docker logs test-container
